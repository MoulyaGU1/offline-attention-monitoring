<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attention Mapping | History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>
<body class="history-page">
    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <h1>SESSION<span>HISTORY</span></h1>
                <p>LOCAL DATA REPOSITORY</p>
            </div>
            <button onclick="window.location.href='/'" class="btn-secondary">BACK TO LIVE</button>
        </header>

       <section class="card history-container">
    <table class="history-table">
        <thead>
            <tr>
                <th>Timeline (IST)</th>
                <th>Total Duration</th>
                <th style="color: #ffcc00;">Recovery Segment</th>
                <th>Context Switches</th>
                <th>Primary Gravity</th>
                <th style="width: 150px;">Interaction Bursts</th>
                <th>Density</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
</section>

<script>
async function loadHistory() {
    const response = await fetch('/api/history');
    const sessions = await response.json();
    const tableBody = document.getElementById('historyBody');
    tableBody.innerHTML = '';

    sessions.forEach(row => {
        // row[1]:Time, row[3]:Dur, row[10]:Recovery, row[7]:Switches, row[8]:Gravity, row[9]:Density
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${row[1]}</td>
            <td>${Math.round(row[3])}s</td>
            <td style="color: #ffcc00; font-weight: bold;">${Math.round(row[10])}s</td>
            <td>${row[7]}</td>
            <td><span class="focus-app-name">${row[8]}</span></td>
            <td><div class="bar-graph-container">${generateTopologyBars(row[9])}</div></td>
            <td style="color: #00ff88;">${parseFloat(row[9]).toFixed(2)}x</td>
        `;
        tableBody.appendChild(tr);
    });
}

function generateTopologyBars(density) {
    let bars = '';
    for(let i=0; i<8; i++) {
        const h = Math.random() * (density * 12) + 4;
        bars += `<div style="height:${h}px; width:4px; background:#00ff88; margin:1px; display:inline-block; border-radius:1px;"></div>`;
    }
    return bars;
}
window.onload = loadHistory;


function generateBars(intensity) {
    let bars = '';
    for(let i=0; i<10; i++) {
        const h = Math.random() * (intensity * 15) + 5;
        bars += `<div style="height:${h}px; width:3px; background:#00ff88; margin:1px; display:inline-block;"></div>`;
    }
    return bars;
}
</script>
    <style>
    /* Table & Container Styling */
    .history-table { width: 100%; border-collapse: collapse; background: #0a0a0a; }
    .history-table th { color: #00ff88; text-transform: uppercase; font-size: 0.75rem; padding: 15px; border-bottom: 2px solid #1a1a1a; }
    .history-table td { padding: 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }

    /* Bar Graph Container */
    /* Container for the mini bar graphs */
.bar-graph-container {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 35px;
    width: 100px;
    background: rgba(0, 255, 136, 0.05);
    padding: 4px;
    border-radius: 4px;
}

.attention-bar {
    flex: 1;
    background: #00ff88; /* Matrix Green */
    border-radius: 1px 1px 0 0;
    min-width: 4px;
}

/* Ensure app names don't break the table */
.focus-app-name {
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
}
</style>
</body>
</html>
