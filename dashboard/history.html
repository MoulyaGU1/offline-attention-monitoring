<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attention Mapping | History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>
<body class="history-page">
    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <h1>SESSION<span>HISTORY</span></h1>
                <p>LOCAL DATA REPOSITORY</p>
            </div>
            <button onclick="window.location.href='/'" class="btn-secondary">BACK TO LIVE</button>
        </header>

       <section class="card history-container">
    <table class="history-table">
        <thead>
            <tr>
                <th>Timeline (IST)</th>
                <th>Total Duration</th>
                <th style="color: #ffcc00;">Recovery Segment</th>
                <th>Context Switches</th>
                <th>Primary Gravity</th>
                <th style="width: 150px;">Interaction Bursts</th>
                <th>Density</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
</section>

<script>
async function loadHistory() {
    try {
        console.log("Attempting to fetch history from local node...");
        const response = await fetch('/api/history');
        const data = await response.json();
        
        const body = document.getElementById('historyBody');
        if (!body) {
            console.error("Error: historyBody element not found in DOM.");
            return;
        }

        // --- THE CRITICAL BRIDGE ---
        // We look for the "raw_history" key from your merged Python response
        const sessions = data.raw_history || data;

        if (!Array.isArray(sessions)) {
            console.warn("No session array found. Data received:", data);
            return;
        }

        body.innerHTML = sessions.map(row => {
            // MATCHING YOUR SQL COLUMN SCHEMA (Index 0-10)
            const startTime = row[1];
            const duration  = Math.floor(row[3]) || 0;
            const jumps     = row[7] || 0;
            const topApp    = row[8] || "None";
            const intensity = parseFloat(row[9]) || 1.0;
            const idleTime  = Math.floor(row[10]) || 0;

            return `
                <tr>
                    <td>${startTime}</td>
                    <td>${duration}s</td>
                    <td style="color: #ffcc00; font-weight: bold;">${idleTime}s</td>
                    <td>${jumps}</td>
                    <td><span class="focus-app-name">${topApp}</span></td>
                    <td><div class="bar-graph-container">${generateTopologyBars(intensity)}</div></td>
                    <td style="color: #00ff88;">${intensity.toFixed(2)}x</td>
                </tr>
            `;
        }).join('');
        
        console.log("History table populated successfully.");
    } catch (err) {
        console.error("History Load Error:", err);
    }
}

/**
 * GENERATE TOPOLOGY BARS
 * Visualizes interaction bursts in the table row.
 */
function generateTopologyBars(density) {
    let bars = '';
    for(let i=0; i<8; i++) {
        const h = Math.random() * (density * 12) + 4;
        bars += `<div style="height:${h}px; width:4px; background:#00ff88; margin:1px; display:inline-block; border-radius:1px;"></div>`;
    }
    return bars;
}

// CRITICAL: Ensure the function runs as soon as the window loads
window.onload = loadHistory;


function generateBars(intensity) {
    let bars = '';
    for(let i=0; i<10; i++) {
        const h = Math.random() * (intensity * 15) + 5;
        bars += `<div style="height:${h}px; width:3px; background:#00ff88; margin:1px; display:inline-block;"></div>`;
    }
    return bars;
}
</script>
    <style>
    /* Table & Container Styling */
    .history-table { width: 100%; border-collapse: collapse; background: #0a0a0a; }
    .history-table th { color: #00ff88; text-transform: uppercase; font-size: 0.75rem; padding: 15px; border-bottom: 2px solid #1a1a1a; }
    .history-table td { padding: 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }

    /* Bar Graph Container */
    /* Container for the mini bar graphs */
.bar-graph-container {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 35px;
    width: 100px;
    background: rgba(0, 255, 136, 0.05);
    padding: 4px;
    border-radius: 4px;
}

.attention-bar {
    flex: 1;
    background: #00ff88; /* Matrix Green */
    border-radius: 1px 1px 0 0;
    min-width: 4px;
}

/* Ensure app names don't break the table */
.focus-app-name {
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
}
</style>
</body>
</html>
