<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroState | Visual Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Real-world DNA & Heatmap Styles */
        .analytics-view { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .dna-node { padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 0.85rem; }
        .dna-node.focus { color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .dna-node.switch { color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .dna-node.idle { color: #555; background: rgba(255, 255, 255, 0.05); }
        .dna-arrow { color: #333; margin: 0 8px; font-weight: bold; }
        
        #patternText { 
            word-wrap: break-word; 
            line-height: 2.2; 
            min-height: 60px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .selector-btn {
            background: #111;
            border: 1px solid #333;
            color: #888;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }
        .selector-btn.active { color: #00ff88; border-color: #00ff88; background: rgba(0, 255, 136, 0.05); }
        
        #river-container {
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            position: relative;
        }
        canvas#heatmapRiverChart { width: 100%; height: 100%; display: block; }
    </style>
</head>

<body class="analytics-view">
    <div class="app-container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        
        <header class="main-header" style="border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px;">
            <div class="header-top-row" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div class="brand">
                    <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 2px;">PATTERN<span style="color: #00ff88;">ANALYSIS</span></h1>
                    <p style="margin: 0; font-size: 0.7rem; color: #555; letter-spacing: 2px;">OFFLINE TOPOLOGY ENGINE</p>
                </div>

                <div id="status-bar" style="display: flex; gap: 20px; background: #111; padding: 8px 25px; border-radius: 50px; border: 1px solid #222;">
                    <div style="font-size: 11px; color: #666;">SHIFTS: <span id="fragmentationCount" style="color: #ff0055; font-weight: bold;">0</span></div>
                    <div style="font-size: 11px; color: #666;">TYPE: <span id="dnaType" style="color: #888; font-weight: bold;">MAPPING...</span></div>
                    <div style="font-size: 11px; color: #666;">EFFICIENCY: <span id="dnaEfficiency" style="color: #00ff88; font-weight: bold;">0%</span></div>
                </div>

                <div class="view-selector" style="display: flex; gap: 10px; align-items: center;">
                    <select id="sessionPicker" class="selector-btn" onchange="updateSessionId()">
                        <option value="all">ALL-TIME OVERVIEW</option>
                    </select>
                    <button class="selector-btn active" onclick="switchPattern('bar')">INTENSITY BARS</button>
                    <button class="selector-btn" onclick="switchPattern('doughnut')">DISTRIBUTION WHEEL</button>
                    <button class="selector-btn" onclick="switchPattern('line')">ATTENTION FLOW</button>
                    <button class="selector-btn back-btn" onclick="window.location.href='/'" style="border-left: 1px solid #333; margin-left: 10px; color: #fff;">🏠 LIVE</button>
                </div>
            </div>
        </header>

        <div style="margin-bottom: 30px;">
            <small style="color: #00ff88; letter-spacing: 2px; text-transform: uppercase; font-size: 10px; display: block; margin-bottom: 10px;">🧬 Real-World Attention DNA</small>
            <div id="patternText">
                <span style="color: #444; font-style: italic;">Awaiting signal recognition...</span>
            </div>
        </div>

        <div id="river-area" style="width: 100%; margin-bottom: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <small style="color: #00ff88; letter-spacing: 2px; text-transform: uppercase; font-size: 10px;">Interaction Density Heatmap</small>
                <small id="heatmap-status" style="color: #333; font-size: 9px; letter-spacing: 1px;">REAL-TIME SIGNAL STREAM</small>
            </div>
            <div id="river-container" style="background: #050505; border: 1px solid #111; border-radius: 12px; height: 120px; padding: 15px;">
                <canvas id="heatmapRiverChart"></canvas>
            </div>
        </div>

        <section class="viz-focus-area">
            <div class="card graph-hero" style="background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px;">
                <div class="card-header" id="patternTitle" style="color: #00ff88; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; text-transform: uppercase;">
                    Attention Intensity (Time-Based)
                </div>
                <div class="canvas-container" style="position: relative; height: 400px; width: 100%;">
                    <canvas id="mainAnalyticsChart"></canvas>
                </div>
            </div>
        </section>
    </div>

    <script>
/**
 * THE TOPOLOGY SYNC
 * Updates the header stats (Shifts, Efficiency, Type) based on the current session data.
 */
setInterval(() => {
    if (typeof sessionHistory !== 'undefined' && sessionHistory.length > 0) {
        
        let focusTicks = 0;
        let switchTicks = 0;

        // 1. Analyze the stream for shifts and efficiency
        sessionHistory.forEach((point) => {
            const val = point.val || 0;
            if (val >= 0.8) focusTicks++;
            if (val >= 0.3 && val < 0.8) switchTicks++;
        });

        // 2. Calculate Real-World Efficiency
        const efficiencyScore = Math.round((focusTicks / sessionHistory.length) * 100);

        // 3. Update the Header IDs (Shifts, State, Efficiency)
        const fragEl = document.getElementById('fragmentationCount');
        const typeEl = document.getElementById('dnaType');
        const effEl = document.getElementById('dnaEfficiency');
        const stateHeader = document.getElementById('attentionState');

        if (fragEl) fragEl.innerText = switchTicks;
        
        if (effEl) {
            effEl.innerText = efficiencyScore + "%";
            effEl.style.color = efficiencyScore > 70 ? "#00ff88" : (efficiencyScore > 40 ? "#ffcc00" : "#ff0055");
        }

        if (stateHeader || typeEl) {
            const currentVal = sessionHistory[sessionHistory.length - 1].val || 0;
            const stateLabel = currentVal >= 0.8 ? "DEEP FOCUS" : (currentVal >= 0.3 ? "FRAGMENTED" : "IDLE");
            
            if (stateHeader) stateHeader.innerText = stateLabel;
            if (typeEl) {
                typeEl.innerText = stateLabel;
                typeEl.style.color = currentVal >= 0.8 ? "#00ff88" : "#ffcc00";
            }
        }
    }
}, 1000);
</script>
    <script src="{{ url_for('static', filename='scripts/analytics.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/dashboard-patch.js') }}"></script>
</body>
</html>
